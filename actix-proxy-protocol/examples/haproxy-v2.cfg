global
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    timeout connect 5s
    timeout client 5s
    timeout server 5s

frontend proxy_v1
    bind *:8080 accept-proxy
    default_backend actix_v1

frontend proxy_v2
    bind *:8081
    unique-id-format %[uuid(),digest(md5)]
    http-request set-var(txn.authority) req.hdr(host)
    default_backend actix_v2

backend actix_v1
    server actix host.docker.internal:19090 send-proxy

backend actix_v2
    server actix host.docker.internal:19090 send-proxy-v2 proxy-v2-options crc32c,unique-id,ssl set-proxy-v2-tlv-fmt(0x01) http/1.1 set-proxy-v2-tlv-fmt(0x02) %[var(txn.authority)]
